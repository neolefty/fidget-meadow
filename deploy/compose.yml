# Runs on the home server from the repo checkout at ~/deploy/fidget-meadow:
#   docker compose -f deploy/compose.yml up -d --build
# Caddy reverse-proxies meadow.beechersoftware.com -> 127.0.0.1:3011.
services:
  meadow:
    build:
      context: ..
      dockerfile: Dockerfile
    image: fidget-meadow:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3011:8787"
    environment:
      PORT: "8787"
    volumes:
      # Future SQLite home (milestone M5). Empty until then.
      - ./data:/data
